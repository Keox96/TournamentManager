# .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  type-check:
    name: Mypy
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Mypy
        run: uv run mypy .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: type-check

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tournament_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Wait for PostgreSQL         
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U user; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run tests
        run: uv run pytest
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5432/tournament_manager 
          APP_ENV: test
          DB_POOL_MIN: 2
          DB_POOL_MAX: 10
          DB_POOL_TIMEOUT: 30